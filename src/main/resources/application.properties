# H2 Database
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
ecommerce.jwtSecret=${JWT_SECRET:ecommerceSecretKeyForJWTGenerationThatIsLongEnoughToBeSecure123456}
ecommerce.jwtExpirationMs=3600000
ecommerce.jwtRefreshExpirationMs=86400000

# Server
server.port=8080
