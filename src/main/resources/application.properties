# PostgreSQL Database (AWS RDS)
spring.datasource.url=jdbc:postgresql://${DB_HOST:ecommerce.cvk840owixha.ap-southeast-2.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 Console (Disabled for PostgreSQL)
spring.h2.console.enabled=false

# JWT Configuration
ecommerce.jwtSecret=${JWT_SECRET:ecommerceSecretKeyForJWTGenerationThatIsLongEnoughToBeSecure123456}
ecommerce.jwtExpirationMs=3600000
ecommerce.jwtRefreshExpirationMs=86400000

# Server
server.port=8080
