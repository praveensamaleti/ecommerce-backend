# PostgreSQL Database (AWS RDS)
spring.datasource.url=jdbc:postgresql://${DB_HOST:ecommerce.cvk840owixha.ap-southeast-2.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# PRODUCTION BEST PRACTICE: set to 'validate' ? Flyway owns all schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway ? database migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# H2 Console (Disabled for PostgreSQL)
spring.h2.console.enabled=false

# JWT Configuration
ecommerce.jwtSecret=${JWT_SECRET:ecommerceSecretKeyForJWTGenerationThatIsLongEnoughToBeSecure123456}
ecommerce.jwtExpirationMs=3600000
ecommerce.jwtRefreshExpirationMs=86400000

# Server
server.port=8080

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:master.str1cu4hrcdb9rmd.fz6h7g.apse2.cache.amazonaws.com}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
