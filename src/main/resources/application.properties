# H2 Database
spring.datasource.url=jdbc:h2:file:./data/ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
ecommerce.jwtSecret=${JWT_SECRET:ecommerceSecretKeyForJWTGenerationThatIsLongEnoughToBeSecure123456}
ecommerce.jwtExpirationMs=3600000
ecommerce.jwtRefreshExpirationMs=86400000

# Server
server.port=8080
